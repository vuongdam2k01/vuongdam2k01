settings:
  max_lines: 5

  disabled_events:
    - "comments"

  date:
    timezone: "GMT+07:00"
    text: "Last updated: {DATE}"
    format: "yyyy-mm-dd HH:MM"

  line_prefix: "{NUM}. "

messages:
  push: "⬆️ Pushed {AMOUNT} commit(s) to {REPO}"

  issue_opened: "❗ Opened issue {ID} in {REPO}"
  issue_closed: "✔️ Closed issue {ID} in {REPO}"

  pr_opened: "🔀 Opened PR {ID} in {REPO}"
  pr_closed: "❌ Closed PR {ID} in {REPO}"
  pr_merged: "✅ Merged PR {ID} in {REPO}"

  create_repo: "🏗️ Created repository {REPO}"

  new_release: "🚀 Released {ID} in {REPO}"